<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>HIRECAR MarketWatch — Choose Your Experience</title>
<meta name="description" content="HIRECAR MarketWatch — Auto Operator Intelligence. Choose desktop or mobile experience.">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;800&family=DM+Mono:wght@400;500&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(circle at 50% 0%, #141414 0%, #0a0a0a 60%);
    color: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 5vw, 40px);
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: clamp(28px, 6vw, 48px);
    text-align: center;
  }
  .brand-lockup {
    display: flex;
    align-items: center;
    gap: clamp(16px, 3vw, 28px);
    flex-wrap: nowrap;
    justify-content: center;
  }
  .brand-mark {
    height: clamp(24px, 4.8vw, 40px);
    width: auto;
    display: block;
    flex-shrink: 0;
  }
  .brand-divider {
    width: 1px;
    align-self: stretch;
    min-height: clamp(52px, 9vw, 84px);
    background: linear-gradient(180deg, transparent 0%, #3a3a3a 20%, #3a3a3a 80%, transparent 100%);
  }
  .brand-right {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 2px;
    text-align: left;
  }
  .brand-title {
    font-family: 'Cormorant Garamond', Georgia, "Times New Roman", serif;
    font-weight: 700;
    font-size: clamp(28px, 5.6vw, 46px);
    line-height: 1;
    color: #f5f5f5;
    letter-spacing: -0.005em;
  }
  .brand-title .bang { color: #ff4500; }
  .brand-kicker {
    font-family: 'DM Mono', ui-monospace, "SF Mono", Menlo, monospace;
    font-size: clamp(11px, 1.9vw, 13px);
    color: #ff4500;
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
    line-height: 1;
  }
  .brand-legal {
    font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: clamp(9px, 1.6vw, 10.5px);
    color: #6a6a6a;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 400;
    margin-top: 2px;
  }
  .brand .tagline {
    font-size: clamp(12px, 2.2vw, 14px);
    color: #888;
    margin-top: clamp(14px, 2.5vw, 22px);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .detected {
    font-size: clamp(13px, 2.4vw, 15px);
    color: #aaa;
    margin-bottom: clamp(20px, 4vw, 32px);
    text-align: center;
    max-width: 480px;
  }
  .detected strong { color: #f5f5f5; }
  .options {
    display: grid;
    gap: clamp(12px, 2.5vw, 20px);
    width: 100%;
    max-width: 720px;
    grid-template-columns: 1fr 1fr;
  }
  .option {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: clamp(22px, 4vw, 36px) clamp(18px, 3vw, 28px);
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    position: relative;
    text-align: center;
    min-height: clamp(140px, 22vw, 180px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .option:hover, .option:focus-visible {
    transform: translateY(-2px);
    border-color: #ff4500;
    background: #1c1c1c;
    outline: none;
  }
  .option.recommended {
    border-color: #ff4500;
    background: linear-gradient(180deg, rgba(255, 69, 0, 0.08) 0%, #161616 100%);
    box-shadow: 0 8px 28px rgba(255, 69, 0, 0.12);
  }
  .option.recommended::before {
    content: "Recommended";
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff4500;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .option .icon {
    font-size: clamp(32px, 6vw, 44px);
    margin-bottom: 10px;
    line-height: 1;
  }
  .option .label {
    font-weight: 700;
    font-size: clamp(15px, 3vw, 19px);
    margin-bottom: 4px;
  }
  .option .sub {
    font-size: clamp(11px, 2vw, 12px);
    color: #888;
  }
  .remember {
    margin-top: clamp(20px, 4vw, 32px);
    font-size: clamp(11px, 2.2vw, 13px);
    color: #888;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .remember input { accent-color: #ff4500; cursor: pointer; width: 14px; height: 14px; }
  .footer {
    margin-top: clamp(24px, 5vw, 40px);
    font-size: 11px;
    color: #444;
    text-align: center;
  }
  .footer a { color: #666; text-decoration: none; }
  .footer a:hover { color: #ff4500; }
  @media (max-width: 540px) {
    .options { grid-template-columns: 1fr; }
    .option.recommended { order: -1; }
    .brand-lockup { flex-direction: column; gap: 12px; }
    .brand-divider {
      width: clamp(60px, 30vw, 120px);
      min-height: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, #3a3a3a 20%, #3a3a3a 80%, transparent 100%);
    }
    .brand-right { align-items: stretch; text-align: center; }
  }
  @media (prefers-reduced-motion: reduce) {
    .option, .option:hover { transition: none; transform: none; }
  }
</style>
</head>
<body>
  <div class="brand">
    <div class="brand-lockup">
      <img class="brand-mark" src="img/hirecar-logo.png" alt="HIRECAR">
      <div class="brand-divider" aria-hidden="true"></div>
      <div class="brand-right">
        <div class="brand-title">MarketWatch<span class="bang">!</span></div>
        <div class="brand-kicker"><span>{</span><span>N</span><span>E</span><span>W</span><span>S</span><span>+</span><span>M</span><span>E</span><span>D</span><span>I</span><span>A</span><span>}</span></div>
        <div class="brand-legal">HIRECAR LLC &middot; EST. NOVEMBER 2024</div>
      </div>
    </div>
    <div class="tagline">Auto Operator Intelligence &middot; Los Angeles</div>
  </div>

  <div class="detected" id="detected"></div>

  <div class="options" id="options">
    <a class="option" data-v="desktop" href="/desktop.html">
      <div class="icon" aria-hidden="true">&#128187;</div>
      <div class="label">Desktop Version</div>
      <div class="sub">Full experience &middot; wider viewports</div>
    </a>
    <a class="option" data-v="mobile" href="/mobile.html">
      <div class="icon" aria-hidden="true">&#128241;</div>
      <div class="label">Mobile Version</div>
      <div class="sub">Optimized for phones</div>
    </a>
  </div>

  <label class="remember">
    <input type="checkbox" id="remember" checked>
    Remember my choice on this device
  </label>

  <div class="footer">
    &copy; HIRECAR &middot; <a href="https://hirecar.la">hirecar.la</a>
  </div>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var forceReset = params.has('reset') || params.has('pick');
  var STORAGE_KEY = 'hc-mw-version-choice';

  if (forceReset) {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  } else {
    try {
      var stored = localStorage.getItem(STORAGE_KEY);
      if (stored === 'desktop' || stored === 'mobile') {
        location.replace('/' + stored + '.html');
        return;
      }
    } catch (e) { /* localStorage unavailable - fall through */ }
  }

  // Detect viewport; recommend mobile at <=768px
  var isNarrow = window.matchMedia('(max-width: 768px)').matches;
  var recommended = isNarrow ? 'mobile' : 'desktop';

  var recEl = document.querySelector('[data-v="' + recommended + '"]');
  if (recEl) recEl.classList.add('recommended');

  var detectedEl = document.getElementById('detected');
  if (detectedEl) {
    detectedEl.innerHTML = 'Detected: <strong>' +
      (isNarrow ? 'mobile viewport' : 'desktop viewport') +
      '</strong> &middot; ' + window.innerWidth + 'px wide';
  }

  // Remember choice on click
  document.querySelectorAll('.option').forEach(function (el) {
    el.addEventListener('click', function () {
      var remember = document.getElementById('remember');
      if (remember && remember.checked) {
        try { localStorage.setItem(STORAGE_KEY, el.dataset.v); } catch (e) {}
      }
    });
  });
})();
</script>
</body>
</html>
