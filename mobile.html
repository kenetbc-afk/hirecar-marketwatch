<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#000000">
<title>HIRECAR MarketWatch! — Mobile</title>
<meta name="description" content="HIRECAR MarketWatch! — mobile edition.">
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    align-items: stretch;
    justify-content: center;
  }
  iframe#mw-frame {
    display: block;
    border: 0;
    background: #000;
    /* On narrow windows (real phones) fill the viewport; on wider
       windows render inside a 430px phone-width column, centered.
       The iframe's own viewport is what mobile-inner.html's media
       queries see, so it behaves like a phone regardless of the
       outer window size. */
    width: min(100vw, 430px);
    height: 100vh;
    height: 100dvh;
    box-shadow: 0 0 0 1px rgba(255,255,255,.06),
                0 24px 80px rgba(0,0,0,.6);
  }
  @media (max-width: 480px) {
    iframe#mw-frame {
      box-shadow: none;
    }
  }
</style>
</head>
<body>
<iframe id="mw-frame"
        src="/mobile-inner.html"
        title="HIRECAR MarketWatch Mobile"
        allow="clipboard-write; fullscreen"
        scrolling="yes"></iframe>
</body>
</html>
