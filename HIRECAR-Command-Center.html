  <span style={{width:6,height:6,borderRadius:"50%",background:color,display:"inline-block",boxShadow:`0 0 5px ${color}66`,flexShrink:0,...(pulse?{animation:"pulse 1.4s infinite"}:{})}}/>
);
const Pill = ({text,color="#C9A84C",small=false}) => (
  <span style={{display:"inline-block",padding:small?"1px 6px":"2px 7px",borderRadius:2,fontSize:small?9:10,letterSpacing:0.5,background:`${color}18`,border:`1px solid ${color}44`,color,whiteSpace:"nowrap"}}>{text}</span>
);
const Card = ({children,style={}}) => (
  <div style={{background:"rgba(16,16,28,0.97)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:4,padding:14,...style}}>{children}</div>
);
const SL = ({text,right=null}) => (
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
    <span style={{fontSize:9,letterSpacing:2.5,color:"rgba(232,224,208,0.3)",textTransform:"uppercase"}}>{text}</span>
    {right && <span style={{fontSize:10,color:"#C9A84C"}}>{right}</span>}
  </div>
);
const TH = ({cols,widths}) => (
  <div style={{display:"grid",gridTemplateColumns:widths,gap:8,padding:"5px 0",borderBottom:"1px solid rgba(201,168,76,0.15)",marginBottom:4}}>
    {cols.map(c=><span key={c} style={{fontSize:8,letterSpacing:1.5,color:"rgba(232,224,208,0.25)",textTransform:"uppercase"}}>{c}</span>)}
  </div>
);
const StatCard = ({label,value,sub,color="#C9A84C",trend=null}) => (
  <Card style={{padding:"14px 16px"}}>
    <div style={{fontSize:8,letterSpacing:2,color:"rgba(232,224,208,0.3)",marginBottom:6,textTransform:"uppercase"}}>{label}</div>
    <div style={{fontSize:22,color,fontWeight:"bold",letterSpacing:-1,marginBottom:3}}>{value}</div>
    {sub&&<div style={{fontSize:10,color:trend===1?"#5ED99A":trend===-1?"#E05A5A":"rgba(232,224,208,0.4)"}}>{sub}</div>}
  </Card>
);
const Btn = ({children,color="#C9A84C",onClick,small=false}) => (
  <button onClick={onClick} style={{background:`${color}12`,border:`1px solid ${color}35`,borderRadius:2,padding:small?"2px 7px":"4px 10px",color,fontSize:small?9:10,cursor:"pointer",fontFamily:"'DM Mono',monospace",whiteSpace:"nowrap",letterSpacing:0.5}}>{children}</button>
);
const BotPanel = ({bots}) => (
  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
    {bots.map(b=>(
      <div key={b.role} style={{background:"rgba(12,12,24,0.97)",border:`1px solid ${BRC[b.role]}22`,borderTop:`2px solid ${BRC[b.role]}`,borderRadius:4,padding:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <div><div style={{fontSize:8,letterSpacing:2,color:BRC[b.role],textTransform:"uppercase",marginBottom:2}}>{b.role} Bot</div><div style={{fontSize:10,color:"#E8E0D0",lineHeight:1.3}}>{b.name}</div></div>
          <Dot color="#5ED99A" pulse/>
        </div>
        <div style={{fontSize:9,color:"rgba(232,224,208,0.35)",lineHeight:1.5,marginBottom:10}}>{b.d}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontSize:18,fontWeight:"bold",color:BRC[b.role]}}>{b.q}</div><div style={{fontSize:7,color:"rgba(232,224,208,0.25)",letterSpacing:1}}>QUEUE</div></div>
          <span style={{fontSize:8,color:"rgba(232,224,208,0.25)"}}>fired {b.f}</span>
        </div>
      </div>
    ))}
  </div>
);
const ScoreBar = ({label,val,color}) => (
  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
    <span style={{fontSize:9,color,width:26,letterSpacing:1}}>{label}</span>
    <div style={{flex:1,height:4,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${val}%`,background:color,borderRadius:2}}/></div>
    <span style={{fontSize:10,color,width:22,textAlign:"right"}}>{val}</span>
  </div>
);
const BarChart = ({data,keyR,keyV,colorFn,height=80}) => {
  const max = Math.max(...data.map(d=>d[keyV]));
  return (
    <div style={{display:"flex",gap:6,alignItems:"flex-end",height}}>
      {data.map((d,i)=>{
        const h=Math.round((d[keyV]/max)*(height-16))+8;
        const isLast=i===data.length-1;
        const color=colorFn?colorFn(d,i,isLast):(isLast?"rgba(201,168,76,0.4)":"rgba(94,168,224,0.15)");
        const border=colorFn?`1px solid ${colorFn(d,i,isLast)}`:(isLast?"1px solid rgba(201,168,76,0.7)":"1px solid rgba(94,168,224,0.3)");
        return (
          <div key={d[keyR]} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:8,color:isLast?"#C9A84C":"rgba(232,224,208,0.4)"}}>{typeof d[keyV]==="number"&&d[keyV]>999?(d[keyV]/1000).toFixed(0)+"K":d[keyV]}</span>
            <div style={{width:"100%",height:h,background:color,border,borderRadius:"2px 2px 0 0"}}/>
            <span style={{fontSize:8,color:isLast?"#C9A84C":"rgba(232,224,208,0.3)"}}>{d[keyR]}</span>
          </div>
        );
      })}
    </div>
  );
};

// ── DEPARTMENT VIEWS ───────────────────────────────────────────────────
function SalesView({client}) {
  const [busy,setBusy] = useState({});
  const fire = id => { setBusy(p=>({...p,[id]:true})); setTimeout(()=>setBusy(p=>{const n={...p};delete n[id];return n;}),1800); };
  const pipeVal = LEADS.reduce((s,l)=>s+l.value,0);
  const stages = ["Discovery","Proposal","Quote Sent","Negotiating","Follow-Up","Closed"];
  const stageC = {Discovery:"#5EA8E0",Proposal:"#A084E8","Quote Sent":"#C9A84C",Negotiating:"#F0C040","Follow-Up":"#E0925A",Closed:"#5ED99A"};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
        <StatCard label="Active Leads"    value={LEADS.filter(l=>l.status!=="Closed Won").length} sub="+3 this week"    color="#5ED99A" trend={1}/>
        <StatCard label="Pipeline Value"  value={fmt$(pipeVal)}                                   sub="8 open deals"    color="#C9A84C"/>
        <StatCard label="Quotes Pending"  value={QUOTES.filter(q=>q.status!=="Negotiating").length} sub="Awaiting reply"color="#F0C040"/>
        <StatCard label="High Prob Deals" value={LEADS.filter(l=>l.prob>=60&&l.status!=="Closed Won").length} sub="≥60% close rate" color="#A084E8" trend={1}/>
        <StatCard label="Closed MTD"      value={fmt$(6800)}                                       sub="1 deal closed"  color="#5EA8E0"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Card>
          <SL text="Lead Pipeline" right={`${LEADS.length} leads`}/>
          <TH cols={["ID","Name","Source","Stage","Value","Prob","Action"]} widths="60px 1fr 80px 95px 70px 42px 80px"/>
          {LEADS.map(l=>(
            <div key={l.id} className="hrow" style={{display:"grid",gridTemplateColumns:"60px 1fr 80px 95px 70px 42px 80px",gap:8,padding:"6px 0",borderBottom:"1px solid rgba(201,168,76,0.05)",alignItems:"center",fontSize:10}}>
              <span style={{fontSize:8,color:"#5ED99A"}}>{l.id}</span>
              <span style={{color:"#E8E0D0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.name}</span>
              <Pill text={l.source} color="#5EA8E0" small/>
              <span style={{fontSize:9,color:stageC[l.stage]||"#C9A84C"}}>{l.stage}</span>
              <span style={{color:"#5ED99A"}}>{fmt$(l.value)}</span>
              <span style={{fontSize:9,color:l.prob>=60?"#5ED99A":l.prob>=40?"#C9A84C":"#888"}}>{l.prob}%</span>
              <Btn color="#5ED99A" small onClick={()=>fire(l.id+"q")}>{busy[l.id+"q"]?"Sent ✓":"Quote"}</Btn>
            </div>
          ))}
        </Card>
        <Card>
          <SL text="Active Quotes" right={fmt$(QUOTES.reduce((s,q)=>s+q.amount,0))}/>
          <TH cols={["ID","Client","Service","Amount","Expires","Status","Action"]} widths="65px 100px 1fr 65px 62px 100px 80px"/>
          {QUOTES.map(q=>(
            <div key={q.id} className="hrow" style={{display:"grid",gridTemplateColumns:"65px 100px 1fr 65px 62px 100px 80px",gap:8,padding:"6px 0",borderBottom:"1px solid rgba(201,168,76,0.05)",alignItems:"center",fontSize:10}}>
              <span style={{fontSize:8,color:"#C9A84C"}}>{q.id}</span>
              <span style={{color:"#E8E0D0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.client}</span>
              <span style={{color:"rgba(232,224,208,0.5)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{q.service}</span>
              <span style={{color:"#5ED99A"}}>{fmt$(q.amount)}</span>
              <span style={{fontSize:8,color:"rgba(232,224,208,0.35)"}}>{q.expires}</span>
              <Pill text={q.status} color={sc(q.status)} small/>
              <Btn color="#C9A84C" small onClick={()=>fire(q.id+"f")}>{busy[q.id+"f"]?"Sent ✓":"Follow-Up"}</Btn>
            </div>
          ))}
        </Card>
      </div>
      <Card>
        <SL text="Sales Funnel"/>
        <div style={{display:"flex",gap:8,alignItems:"flex-end",height:60}}>
          {stages.map(s=>{
            const n=LEADS.filter(l=>l.stage===s).length;
            const h=Math.max(12,n*18);
            return (
              <div key={s} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <span style={{fontSize:10,color:stageC[s]||"#888"}}>{n}</span>
                <div style={{width:"100%",height:h,background:`${stageC[s]||"#888"}25`,border:`1px solid ${stageC[s]||"#888"}44`,borderRadius:2}}/>
                <span style={{fontSize:7,color:"rgba(232,224,208,0.3)",textAlign:"center"}}>{s}</span>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

function CRMView({client}) {
  if(!client) return <Card><div style={{textAlign:"center",padding:40,color:"rgba(232,224,208,0.25)",fontSize:12}}>Select a client from the sidebar</div></Card>;
  const tc=TC[client.tier]||"#888";
  const prev=[0,500,1500,3000][["Standard","Operator","First Class","Elite"].indexOf(client.tier)]||0;
  const next=[500,1500,3000,6000][["Standard","Operator","First Class","Elite"].indexOf(client.tier)]||6000;
  const pct=Math.min(100,Math.round(((client.xp-prev)/(next-prev))*100));
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Card>
        <SL text="Client Profile"/>
        <div style={{display:"flex",gap:12,marginBottom:14}}>
          <div style={{width:50,height:50,borderRadius:"50%",background:`${tc}22`,border:`2px solid ${tc}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,color:tc,fontWeight:"bold",flexShrink:0}}>{client.av}</div>
          <div>
            <div style={{fontSize:15,color:"#E8E0D0",fontWeight:"500",marginBottom:2}}>{client.name}</div>
            <div style={{fontSize:9,color:"rgba(232,224,208,0.4)",marginBottom:5}}>{client.id} · {client.phase}</div>
            <div style={{display:"flex",gap:5}}><Pill text={client.tier} color={tc} small/><Pill text={client.status} color={sc(client.status)} small/></div>

function HireBot({client}) {
  const [open,setOpen] = useState(false);
  const [msgs,setMsgs] = useState([{role:"bot",text:"Welcome to HIRECAR Command. I'm HIRE_BOT. I can help you draft emails, pull client records, send SMS, or generate reports. What do you need?",ts:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})}]);
  const [input,setInput] = useState("");
  const bodyRef = useRef(null);

  useEffect(()=>{ if(open&&bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs,open]);

  const send = (text) => {
    if(!text.trim()) return;
    const now = new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    const lower = text.toLowerCase();
    let resp = "Got it. Let me pull the relevant data and draft that for you.";
    if(lower.includes("email")||lower.includes("send")) resp=`Drafting email via SendGrid API${client?` to ${client.name}`:""}. Template queued for Supervisor release.`;
    else if(lower.includes("sms")||lower.includes("text")||lower.includes("twilio")) resp=`Queuing SMS via Twilio${client?` to ${client.name} at ${client.phone}`:""}. Delivery estimate: 2 seconds.`;
    else if(lower.includes("invoice")||lower.includes("billing")) resp="Pulling billing records. I see 2 pending and 1 overdue invoice. Want me to send reminders via Stripe webhook?";
    else if(lower.includes("report")||lower.includes("sales")) resp="Compiling sales report: $34.8K MTD, 62 leads, 24 conversions, 38.7% close rate. Sending to executive dashboard.";
    else if(lower.includes("quote")) resp="I can generate a quote right now. Which client and service package?";
    else if(lower.includes("lead")) resp=`Pipeline: ${LEADS.length} leads active, $${LEADS.reduce((s,l)=>s+l.value,0).toLocaleString()} total value. 3 need immediate follow-up.`;
    else if(lower.includes("overdue")) resp="Overdue flags: Priya Kapoor $1,200 (INV-8843, 3 days), Westside Auto Detail $920 (SUP-105, 6 days). Sending escalation now?";
    setMsgs(p=>[...p,{role:"user",text,ts:now},{role:"bot",text:resp,ts:now}]);
    setInput("");
  };

  return (
    <div style={{position:"fixed",bottom:20,right:20,zIndex:999,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10}}>
      {open && (
        <div style={{width:340,background:"rgba(8,8,20,0.98)",border:"1px solid rgba(201,168,76,0.4)",borderRadius:6,overflow:"hidden",boxShadow:"0 20px 60px rgba(0,0,0,0.85)"}}>
          <div style={{background:"rgba(201,168,76,0.08)",borderBottom:"1px solid rgba(201,168,76,0.25)",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#C9A84C,#5A3E0A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:"bold"}}>H</div>
              <div><div style={{fontSize:11,color:"#C9A84C",fontWeight:"bold",letterSpacing:1}}>HIRE_BOT</div><div style={{display:"flex",alignItems:"center",gap:5}}><Dot color="#5ED99A" pulse/><span style={{fontSize:9,color:"#5ED99A"}}>Online — All APIs Connected</span></div></div>
            </div>
            <button onClick={()=>setOpen(false)} style={{background:"none",border:"none",color:"rgba(232,224,208,0.4)",cursor:"pointer",fontSize:18,fontFamily:"monospace"}}>×</button>
          </div>
          <div ref={bodyRef} style={{padding:14,height:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:10}}>
            {msgs.map((m,i)=>(

  const [body, setBody] = useState("");
  const [sending, setSending] = useState(false);

  useEffect(() => { if(client) setTo(client.email); }, [client]);

  const applyTemplate = (t) => {
    setTmpl(t.name);

    const templates = {
      "Welcome Onboarding": { subj: `Welcome to HIRECAR, ${client?.name || ""}!`, body: `Hi ${name},\n\nWelcome to the HIRECAR family! We're excited to have you on board as a ${client?.tier || ""} member.\n\nYour dedicated operator team is ready to support your journey. Here's what happens next:\n\n1. Your account has been activated (${client?.id || ""})\n2. You'll receive your digital membership pass within 24 hours\n3. Your first vehicle booking is ready to schedule\n\nIf you have any questions, reply to this email or call us at (213) 555-0100.\n\nBest regards,\nKen — HIRECAR Operations` },

// ── PASSWORD GATE ─────────────────────────────────────────────────────
// Default password: "hirecar2026" — SHA-256 hash stored below
// To change: run in browser console: crypto.subtle.digest('SHA-256', new TextEncoder().encode('YOUR_NEW_PASSWORD')).then(h=>console.log([...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('')))
const PASS_HASH = "536c035206b2078b540291e63db1c05683453fe0669a91c2b5147e802579d11a";
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}

function LoginGate({children}) {
  const [authed, setAuthed] = useState(()=> sessionStorage.getItem("hc_auth")==="1");
  const [pass, setPass] = useState("");
  const [error, setError] = useState(false);
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    if(!pass.trim()) return;
    setLoading(true);
    setError(false);
    const hash = await sha256(pass);
    // Accept the hardcoded hash OR the plaintext fallback "hirecar2026"
    if(hash === PASS_HASH || pass === "hirecar2026") {
      sessionStorage.setItem("hc_auth","1");
      setAuthed(true);
    } else {
      setError(true);
    }
    setLoading(false);
  };

  const handleLogout = useCallback(() => {
    sessionStorage.removeItem("hc_auth");
    setAuthed(false);
    setPass("");
  }, []);

  // Expose logout globally so topbar can call it
  window.__hc_logout = handleLogout;

  if(authed) return children;

  return (
    <div style={{fontFamily:"'DM Mono',monospace",background:"#05050F",color:"#E8E0D0",height:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:380,textAlign:"center"}}>

        <div style={{marginBottom:32}}>
          <div style={{fontFamily:"'Bebas Neue'",fontSize:42,letterSpacing:8,color:"#C9A84C",marginBottom:6}}>HIRECAR</div>
          <div style={{fontSize:9,letterSpacing:4,color:"rgba(232,224,208,0.25)",textTransform:"uppercase"}}>Command Center v2</div>
        </div>

        {/* Login Box */}
        <div style={{background:"rgba(10,10,22,0.98)",border:"1px solid rgba(201,168,76,0.2)",borderRadius:6,padding:"28px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.6)"}}>
          <div style={{fontSize:8,letterSpacing:3,color:"rgba(232,224,208,0.3)",marginBottom:16,textTransform:"uppercase"}}>Operator Authentication</div>

          <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:12}}>
            <div style={{width:36,height:36,background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.2)",borderRight:"none",borderRadius:"3px 0 0 3px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"rgba(201,168,76,0.4)"}}>🔒</div>
            <input
              type="password"
              value={pass}
              onChange={e=>{setPass(e.target.value);setError(false);}}
              onKeyDown={e=>e.key==="Enter"&&handleLogin()}
              placeholder="Enter access code..."
              autoFocus
              style={{flex:1,background:"rgba(201,168,76,0.04)",border:"1px solid rgba(201,168,76,0.18)",borderLeft:"none",borderRadius:"0 3px 3px 0",padding:"9px 12px",color:"#E8E0D0",fontSize:12,fontFamily:"'DM Mono',monospace"}}
            />
          </div>

          {error && (
            <div style={{fontSize:10,color:"#E05A5A",marginBottom:10,display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
              <span>⚠</span> Invalid access code — try again
            </div>
          )}

          <button onClick={handleLogin} disabled={loading||!pass.trim()} style={{width:"100%",background:pass.trim()?"rgba(201,168,76,0.15)":"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:3,padding:"10px 0",color:pass.trim()?"#C9A84C":"rgba(201,168,76,0.25)",fontSize:11,cursor:pass.trim()?"pointer":"default",fontFamily:"'DM Mono',monospace",fontWeight:"bold",letterSpacing:2,transition:"all 0.2s"}}>
            {loading ? "AUTHENTICATING..." : "→ ACCESS COMMAND CENTER"}
          </button>

          <div style={{marginTop:16,fontSize:8,color:"rgba(232,224,208,0.15)",lineHeight:1.6}}>
            Session secured · No data stored locally<br/>
            Authorized personnel only · All access logged
          </div>
        </div>

        {/* Footer */}
        <div style={{marginTop:20,fontSize:8,color:"rgba(232,224,208,0.12)"}}>
          HIRECAR MarketWatch! · Los Angeles · {new Date().getFullYear()}
        </div>
      </div>
    </div>
  );
}

        </div>

        {/* CLIENT SIDEBAR */}
        <div style={{width:228,background:"rgba(9,9,19,0.98)",borderRight:"1px solid rgba(201,168,76,0.1)",display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(201,168,76,0.1)"}}>
            <div style={{fontSize:8,letterSpacing:2.5,color:"rgba(232,224,208,0.25)",marginBottom:7,textTransform:"uppercase"}}>Client Registry</div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search clients..." style={{width:"100%",background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.15)",borderRadius:2,padding:"5px 9px",color:"#E8E0D0",fontSize:10,fontFamily:"'DM Mono',monospace"}}/>
          </div>
          <div style={{flex:1,overflowY:"auto"}}>
            {filtered.map(c=>{
              const tc=TC[c.tier]||"#888";
              return (
                <div key={c.id} className="hrow" onClick={()=>setClient(c)} style={{padding:"9px 12px",borderBottom:"1px solid rgba(201,168,76,0.05)",background:client?.id===c.id?"rgba(201,168,76,0.07)":"transparent",borderLeft:client?.id===c.id?"2px solid #C9A84C":"2px solid transparent",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:`${tc}22`,border:`1px solid ${tc}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:"bold",color:tc,flexShrink:0}}>{c.av}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,color:"#E8E0D0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</div>
                      <div style={{fontSize:8,color:"rgba(232,224,208,0.3)"}}>{c.id}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <Pill text={c.tier} color={tc} small/>
                    <span style={{fontSize:9,color:sc(c.status)}}>{c.status}</span>
                  </div>
                  {c.balance>0&&<div style={{fontSize:8,color:"#E05A5A",marginTop:2}}>⚠ {fmt$(c.balance)} due</div>}
                </div>
              );
            })}
          </div>
          <div style={{padding:"7px 12px",borderTop:"1px solid rgba(201,168,76,0.1)",fontSize:8,color:"rgba(232,224,208,0.2)"}}>{CLIENTS.length} clients · {CLIENTS.filter(c=>c.status==="Active").length} active</div>
        </div>

        {/* MAIN CONTENT */}
        <div style={{flex:1,overflow:"auto",padding:14,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20,color:dm.color}}>{dm.icon}</span>
              <div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:18,letterSpacing:3,color:dm.color}}>{dm.label} DEPARTMENT</div>
                <div style={{fontSize:9,color:"rgba(232,224,208,0.35)",letterSpacing:1}}>{dm.desc}</div>
              </div>
            </div>
            {client&&(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:9,padding:"5px 12px",background:"rgba(201,168,76,0.05)",border:"1px solid rgba(201,168,76,0.18)",borderRadius:3}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:`${TC[client.tier]||"#888"}22`,border:`1px solid ${TC[client.tier]||"#888"}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:TC[client.tier]||"#888"}}>{client.av}</div>
                  <div><div style={{fontSize:10,color:"#C9A84C"}}>{client.name}</div><div style={{fontSize:8,color:"rgba(232,224,208,0.3)"}}>{client.id} · {client.tier}</div></div>
                </div>
                <button onClick={()=>setShowEmail(true)} style={{background:"rgba(94,168,224,0.1)",border:"1px solid rgba(94,168,224,0.25)",borderRadius:3,padding:"6px 12px",color:"#5EA8E0",fontSize:9,cursor:"pointer",fontFamily:"'DM Mono',monospace",display:"flex",alignItems:"center",gap:5,letterSpacing:0.5}}>
                  <span style={{fontSize:12}}>✉</span> Email Client
                </button>
              </div>
            )}
          </div>

          <BotPanel bots={bots}/>

          {dept==="sales"     && <SalesView     client={client}/>}
          {dept==="comms"     && <CommsView     client={client}/>}
          {dept==="marketing" && <MarketingView/>}
          {dept==="crm"       && <CRMView       client={client}/>}
          {dept==="billing"   && <BillingView   client={client}/>}
          {dept==="finance"   && <FinanceView/>}
          {dept==="docs"      && <DocsView      client={client}/>}
          {dept==="support"   && <SupportView/>}
          {dept==="gamify"    && <GamifyView    client={client}/>}
          {dept==="reports"   && <ReportsView/>}
        </div>

        {/* LIVE BOT LOG */}
        <div style={{width:248,background:"rgba(8,8,18,0.99)",borderLeft:"1px solid rgba(201,168,76,0.1)",display:"flex",flexDirection:"column",flexShrink:0}}>
          <div style={{padding:"11px 13px",borderBottom:"1px solid rgba(201,168,76,0.1)"}}>
            <div style={{display:"flex",alignItems:"center",gap:7}}><Dot color="#5ED99A" pulse/><span style={{fontSize:8,letterSpacing:2.5,color:"rgba(232,224,208,0.35)",textTransform:"uppercase"}}>Live Bot Activity</span></div>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"6px 0"}}>
            {log.map((l,i)=>{
              const dm2=DEPT_META.find(d=>d.id===l.dept);
              return (
                <div key={i} className="nd" style={{padding:"7px 13px",borderBottom:"1px solid rgba(201,168,76,0.04)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                    <span style={{fontSize:8,color:dm2?.color||"#C9A84C",letterSpacing:0.5}}>{l.bot}</span>
                    <span style={{fontSize:8,color:"rgba(232,224,208,0.2)"}}>{l.ts}</span>
                  </div>
                  <div style={{fontSize:9,color:"rgba(232,224,208,0.5)",lineHeight:1.4}}>{l.msg}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <HireBot client={client}/>

      {/* EMAIL COMPOSER MODAL */}
      {showEmail && (
        <EmailComposer
          client={client}
          onClose={()=>setShowEmail(false)}
          onSent={({to,subject})=>{
            setEmailCount(c=>c+1);
            setLog(p=>[{bot:"Email Drafter Bot",dept:"comms",msg:`Email sent to ${to} — "${subject}"`,ts:"just now"},...p].slice(0,40));
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <LoginGate><App/></LoginGate>
);
</script>
</body>
</html>
