# ═══════════════════════════════════════════════════════════════
# HIRECAR Payment Orchestration — Cloudflare Worker Configuration
# ARCH-HC-0302 Implementation
# ═══════════════════════════════════════════════════════════════
# Worker: api.hirecar.la
# Bots: #08, #14, #17, #18, #19, #20 (see hire-bot-registry.js)
# Account: ea237ab47beb2ea9a722083a01cc7590
# ═══════════════════════════════════════════════════════════════

name = "hirecar-api"
main = "src/index.js"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain: api.hirecar.la
# Set up via Cloudflare dashboard: Workers → Routes → Add Route
# Route: api.hirecar.la/* → hirecar-payment-api
routes = [
  { pattern = "api.hirecar.la/*", zone_name = "hirecar.la" }
]

# ── D1 Database ──
[[d1_databases]]
binding = "DB"
database_name = "hirecar-db"
database_id = "ada3c40f-a4d9-4b3c-9b40-dde656f6f099"

# ── KV Namespaces ──
[[kv_namespaces]]
binding = "KV"
id = "31944eb74e0d4914a47e7083bcd7208b"

# ── Environment Variables (non-secret) ──
[vars]
ENVIRONMENT = "test"
BREVO_SENDER_NAME = "HIRECAR"
TWILIO_FROM_NUMBER = "+1XXXXXXXXXX"  # Set to actual Twilio number
WIX_SITE_ID = "e3b1f751-8a2e-4f91-9242-44d46b35fc4f"
STRIPE_ACCOUNT_ID = "acct_1T78EAA95N4c0ts1"

# ── Secrets (set via: wrangler secret put SECRET_NAME) ──
# Required secrets:
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put PAYPAL_CLIENT_ID
#   wrangler secret put PAYPAL_SECRET
#   wrangler secret put BREVO_API_KEY
#   wrangler secret put TWILIO_ACCOUNT_SID
#   wrangler secret put TWILIO_AUTH_TOKEN
#   wrangler secret put SLACK_WEBHOOK_URL
#   wrangler secret put FANBASIS_ZAPIER_WEBHOOK_URL
#   wrangler secret put FANBASIS_API_KEY
#   wrangler secret put WIX_API_KEY

# ── Cron Triggers ──
# Lane evaluation runs daily at 6 AM UTC
# Cash receipt expiry check runs every hour
# Product sync health check runs every 6 hours
[triggers]
crons = [
  "0 6 * * *",    # Daily lane evaluation cron
  "0 * * * *",    # Hourly cash receipt expiry check
  "0 */6 * * *"   # Product sync health report every 6 hours
]

# ── Production Environment Override ──
[env.production]
vars = { ENVIRONMENT = "live" }
routes = [
  { pattern = "api.hirecar.la/*", zone_name = "hirecar.la" }
]

# ── Staging Environment ──
[env.staging]
name = "hirecar-payment-api-staging"
vars = { ENVIRONMENT = "test" }
routes = [
  { pattern = "api-staging.hirecar.la/*", zone_name = "hirecar.la" }
]

# ── Build Settings ──
[build]
command = ""  # No build step needed for vanilla JS Workers

# ── Observability ──
[observability]
enabled = true
