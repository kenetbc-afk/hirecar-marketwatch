name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:

jobs:
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          echo "=== Scanning for potential secrets ==="
          # Check for common secret patterns
          FOUND=0
          for pattern in "sk_live_" "sk_test_" "AKIA" "-----BEGIN.*PRIVATE KEY-----" "password\s*=\s*['\"]"; do
            if grep -rn "$pattern" --include="*.js" --include="*.ts" --include="*.html" --include="*.yml" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v .git; then
              echo "⚠️ Potential secret found matching: $pattern"
              FOUND=1
            fi
          done
          if [ $FOUND -eq 0 ]; then
            echo "✅ No hardcoded secrets detected"
          fi
