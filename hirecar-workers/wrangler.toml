name = "hirecar-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# ── Routes ──────────────────────────────────────────────
# Once your domain is on Cloudflare, uncomment:
# routes = [
#   { pattern = "api.hirecar.la/*", zone_name = "hirecar.la" }
# ]

# ── D1 Database ─────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "hirecar-db"
database_id = "ada3c40f-a4d9-4b3c-9b40-dde656f6f099"

# ── KV Namespace (config/cache) ─────────────────────────
[[kv_namespaces]]
binding = "HIRECAR_KV"
id = "31944eb74e0d4914a47e7083bcd7208b"

# ── Secrets (set via `wrangler secret put`) ─────────────
# STRIPE_WEBHOOK_SECRET
# STRIPE_SECRET_KEY
# BREVO_API_KEY
# SLACK_HIRECAR_WEBHOOK_URL    → #hirecar channel (ops alerts, leads, payments, errors)
# SLACK_SALES_WEBHOOK_URL      → 🔒 sales-talk (hot leads, payments)
# SLACK_HOMEBASE_WEBHOOK_URL   → #homebase (daily digest)
# PAYPAL_RECEIVER_EMAIL
# API_KEY                      → (optional) protects /api/* endpoints

# ── Cron Triggers ───────────────────────────────────────
[triggers]
crons = [
  "0 4 * * *"   # Daily digest — 04:00 UTC = 8:00 PM PST
]

# ── Environment: Staging ────────────────────────────────
[env.staging]
name = "hirecar-api-staging"
